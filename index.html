<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Book Collection</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f9f9f9;
        }
        table {
            margin: 20px auto;
            border-collapse: collapse;
            background-color: #ffffff;
        }
        th {
            background-color: #333333;
            color: white;
            font-weight: bold;
            text-align: left;
        }
        tr:nth-child(even) {
            background-color: #f2f2f2;
        }
        caption {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 10px;
            color: #222222;
        }
    </style>
</head>
<body>

    <table width="90%" border="1" cellpadding="10">
        <caption>Library Book Collection</caption>
        <thead>
            <tr>
                <th>Title</th>
                <th>Author</th>
                <th>Publication Year</th>
                <th>Genre</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>To Kill a Mockingbird</td>
                <td>Harper Lee</td>
                <td>1960</td>
                <td>Fiction</td>
            </tr>
            <tr>
                <td>1984</td>
                <td>George Orwell</td>
                <td>1949</td>
                <td>Dystopian</td>
            </tr>
            <tr>
                <td>The Great Gatsby</td>
                <td>F. Scott Fitzgerald</td>
                <td>1925</td>
                <td>Classic Literature</td>
            </tr>
            <tr>
                <td>The Hobbit</td>
                <td>J.R.R. Tolkien</td>
                <td>1937</td>
                <td>Fantasy</td>
            </tr>
            <tr>
                <td>A Brief History of Time</td>
                <td>Stephen Hawking</td>
                <td>1988</td>
                <td>Science</td>
            </tr>
        </tbody>
    </table>

</body>
</html>
